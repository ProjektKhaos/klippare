<!DOCTYPE html>
<!-- base.html – gemensam layout för Klippare. Klipparen är byggd av Hans Åberg och KlⒶsse Kod -->
<html lang="sv">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Klippare{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="{{ url_for('index') }}">✂ Auto Bildarks Klippare by Åberg Online</a>
        <span class="tagline">OpenCV bildark-klippare</span>
        <nav class="top-nav">
            <a class="nav-button" href="{{ url_for('index') }}">Ladda upp</a>
            <a class="nav-button" href="{{ url_for('health') }}">Health</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="wrap footer-inner">
            <div>
                Klipparen är byggd av Hans Åberg och Ai side kick KlⒶsse Kod. Just For Fun And Learning
                <a class="footer-link" href="{{ url_for('about') }}">Om Klippare</a>
            </div>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
